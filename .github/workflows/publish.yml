name: Publicar Controle Digital

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: raphateixeira/.github/.github/workflows/quarto-publish.yml@main
    with:
      needs_r: true
      r_packages: "knitr, rmarkdown"
      output_dir: "docs"
